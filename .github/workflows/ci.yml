name: Scala CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install sbt
        run: |
          echo "Installing sbt..."
          curl -sL https://github.com/sbt/sbt/releases/download/v1.10.2/sbt-1.10.2.tgz | tar xz
          sudo mv sbt /usr/local/
          echo "/usr/local/sbt/bin" >> $GITHUB_PATH

      - name: Cache SBT dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.ivy2/cache
            ~/.sbt
            target/
          key: ${{ runner.os }}-sbt-${{ hashFiles('**/*.sbt', '**/build.properties') }}

      - name: Build
        run: sbt clean compile

      - name: Run tests
        env:
          DB_PASSWORD: test_password
          DB_USER: test_user
          DB_URL: jdbc:postgresql://localhost:5432/test
        run: sbt test
